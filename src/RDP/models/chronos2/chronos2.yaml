
model_configs:
  context_length: ${model_configs.past_steps}
  input_patch_size: 2
  input_patch_stride: 4
  max_output_patches: 64
  output_patch_size: 2
  time_encoding_scale: ${model_configs.past_steps}
  use_arcsinh: true
  use_reg_token: true
  d_ff: 32
  d_kv: 16
  d_model: 16
  dense_act_fn: "relu" # ${model_configs.activation}
  dropout_rate: 0.1
  feed_forward_proj: "relu" # ${model_configs.activation}
  initializer_factor: 0.05
  layer_norm_epsilon: 1e-06
  num_heads: 1
  num_layers: 1
  pad_token_id: 0
  reg_token_id: 1
  rope_theta: 10000.0
  vocab_size: 2
  attn_implementation: 'sdpa' # or 'eager'

  optim: torch.optim.Adam
  persistence_weight: 0.010
  loss_type: 'l1'
  quantiles: [0.1, 0.5, 0.9]