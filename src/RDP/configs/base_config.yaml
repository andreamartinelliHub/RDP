env:
  version: v1
  device: auto
  seed: 0
  timestamp: ${now:%Y%m%d_%H%M%S}

## shortcuts TO BE IMPLEMENTED
m: chronos2 # model
d: synthetic # dataset
e: 3 # epochs
# $ python train.py  m=chronos2 d=synthetic

flow:
  model_name: ${m}
  model_version: 0
  restart: False
  retrain: True
  dataset_name: ${d}
  dataset_version: 0

#####
# model:
#   type: 'which_model'

# dataset:
#   name: synthetic
#   version: 0
  # path: ${paths.dataset_folder}/generated.csv 
  ### NO MORE USED, EVERYTHING IN THE .PY FILE READING THE DATASET IN THE FOLDER


ts:
  name: ${env.timestamp}_${flow.model_name}_${flow.dataset_name}_${flow.model_version}_${flow.dataset_version}
  version: 1
  enrich: null
  use_covariates: True
  use_future_covariates: True
  sampler_weights: None
  check: True

scheduler_config:
  gamma: 1
  step_size: 100

optim_config:
  lr: 1e-05
  wd: 0.001

model_configs:
  past_steps: 16
  future_steps: 8
  quantiles: []
  # dataset dependent part
  past_channels : null 
  future_channels : null
  embs_past: null 
  embs_fut: null
  out_channels: null

split_params:
  perc_train: 0.2
  perc_valid: 0.05
  range_train: null
  range_validation: null 
  range_test: null
  shift: 0
  starting_point: null
  skip_step: 1
  past_steps: model_configs@past_steps 
  future_steps: model_configs@future_steps
  scaler: 'StandardScaler()' ## or sklearn.preprocessing.StandardScaler()
  
stack:
  dirpath: None

train_config:
  dirpath: tmp
  num_workers: 15
  auto_lr_find: false
  devices: [0]                   
  seed: 42   
  max_epochs: 5

inference:
  output_path: tmp
  load_last: true
  batch_size: 200 
  num_workers: 1
  set: "validation"
  rescaling: true

user: # inside `user` put all your customization, like root
  paths:
    root: ./ # (@^@) copy+paste user/default.yaml and add your desired root. Rename the file <your-nickname>.yaml and then add in CLI +user=<your-nickname>
    model_folder: ${.root}src/RDP/models/
    dataset_folder: ${.root}src/RDP/datasets/

#####
defaults:
  - _self_

hydra:
  job_logging: # customizing the logger
    formatters:
      custom_file_format:
        format: "%(asctime)s [%(name)s] [%(funcName)s()] %(message)s"
        datefmt: "%H:%M:%S"
      custom_console_format:
        format: "%(asctime)s [%(levelname)s] [%(name)s] [%(funcName)s()] %(message)s"
        datefmt: "%Y-%m-%d %H:%M:%S"
    handlers: # where printing
      file:
        class: logging.FileHandler
        formatter: custom_file_format
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
      console:
        class: logging.StreamHandler
        formatter: custom_console_format
        stream: ext://sys.stdout